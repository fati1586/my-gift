<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Leo ❤️</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://i.imgur.com/YKY28eT.png");
animation:move 60s linear infinite;
opacity:.5;
}

@keyframes move{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

.content{
position:relative;
text-align:center;
z-index:2;
padding:20px;
}

h1{
font-size:28px;
animation:fade 4s;
}

button{
margin-top:30px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff4f8b;
color:white;
cursor:pointer;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>

</head>

<body>

<div class="stars"></div>

<div class="content">
<h1>
في شخص بالعالم...<br><br>
قدر يغير حياتي كلها...<br><br>
واليوم حبيت قله شي من قلبي... ❤️
</h1>

<button onclick="alert('نكملو الصفحة الثانية من بعد ❤️')">
✨ افتح هديتك ✨
</button>

</div>

</body>
</html>
